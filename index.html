<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Competition Voting</title>

<style>

body{
    font-family:Arial,sans-serif;
    max-width:900px;
    margin:auto;
    padding:20px;
}

h1,h2{
    text-align:center;
}

.team{
    padding:12px;
    margin:8px 0;
    background:#f4f4f4;
    border-radius:8px;
    cursor:grab;
}

#ranking{
    margin-top:20px;
}

input{
    width:100%;
    padding:10px;
    margin-bottom:20px;
}

button{
    padding:12px 24px;
    font-size:16px;
}

.rank{
    display:flex;
    justify-content:space-between;
    padding:10px;
    margin:5px 0;
    background:#eef;
    border-radius:6px;
}

</style>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

</head>

<body>

<h1>Vote for the Teams</h1>

<input id="voter" placeholder="Your name">

<p>Drag teams into your preferred order.</p>

<div id="ranking">

<div class="team">Normanda</div>
<div class="team">Lis</div>
<div class="team">Audrey + Hamish</div>
<div class="team">Lydia</div>
<div class="team">Liam</div>
<div class="team">Alina</div>
<div class="team">Shirley + Bastian</div>
<div class="team">Katharine + Raymond</div>
<div class="team">Thomas + Sophie</div>

</div>

<br>

<button onclick="submitVote()">Submit Vote</button>

<hr>

<h2>Current Leaderboard</h2>

<div id="leaderboard"></div>

<script>

new Sortable(document.getElementById('ranking'),{
    animation:150
});

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbw0LY6qWIIsjSyNWhVPrTV-TCjebQU8TSGOpO2nF5vBIfGMdKfS1NK6G8UygCkErDA/exec";

const points = [12,10,8,7,6,5,4,3,2];

let totals = {};

function submitVote(){

    const voter =
        document.getElementById('voter').value;

    if(!voter){
        alert("Enter your name");
        return;
    }

    const ranking =
        [...document.querySelectorAll('.team')]
        .map(x=>x.textContent);

    fetch(SCRIPT_URL,{
        method:"POST",
        body:JSON.stringify({
            voter,
            ranking
        })
    })
    .then(()=>{

        ranking.forEach((team,index)=>{

            if(!totals[team])
                totals[team]=0;

            totals[team]+=points[index];

        });

        renderLeaderboard();

        alert("Vote submitted!");

    });
}

function renderLeaderboard(){

    const board =
        document.getElementById('leaderboard');

    const sorted =
        Object.entries(totals)
        .sort((a,b)=>b[1]-a[1]);

    board.innerHTML =
        sorted.map((item,i)=>
        `
        <div class="rank">
            <span>#${i+1} ${item[0]}</span>
            <strong>${item[1]}</strong>
        </div>
        `
        ).join('');
}

[
"Normanda",
"Lis",
"Audrey + Hamish",
"Lydia",
"Liam",
"Alina",
"Shirley + Bastian",
"Katharine + Raymond",
"Thomas + Sophie"
].forEach(t=>totals[t]=0);

renderLeaderboard();

</script>

</body>
</html>
