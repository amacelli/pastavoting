<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pasta Competition Voting</title>

<style>

body{
  font-family:Arial,sans-serif;
  max-width:1200px;
  margin:auto;
  padding:20px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  border:1px solid #ddd;
  padding:8px;
  text-align:center;
}

input[type=number]{
  width:55px;
}

button{
  padding:15px 25px;
  font-size:18px;
  margin-top:20px;
}

thead{
  background:#f5f5f5;
}

</style>
</head>

<body>

<h1>🍝 Pasta Competition Voting</h1>

<p>Score each team from 1–10 in every category.</p>

<input id="voter"
       placeholder="Your Name"
       style="padding:10px;width:250px">

<table>

<thead>
<tr>
<th>Team</th>
<th>Taste</th>
<th>Sauce Harmony</th>
<th>Creativity</th>
<th>Tidiness</th>
<th>Team Spirit</th>
<th>Presentation</th>
<th>Technique</th>
</tr>
</thead>

<tbody id="body"></tbody>

</table>

<button onclick="submitVote()">
Submit Vote
</button>

<script>

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbxCVWX9KjZdfMziQwiNoRmijEcExz4Eli48k-oRifkBWVUBWy1hyFG8QV8GjK_ycbY/exec";

const teams = [
"Normanda",
"Lis",
"Audrey + Hamish",
"Lydia",
"Liam",
"Alina",
"Shirley + Bastian",
"Katharine + Raymond",
"Thomas + Sophie"
];

const tbody =
document.getElementById("body");

teams.forEach(team=>{

tbody.innerHTML += `
<tr>

<td>${team}</td>

<td><input min="1" max="10" value="5" type="number"></td>
<td><input min="1" max="10" value="5" type="number"></td>
<td><input min="1" max="10" value="5" type="number"></td>
<td><input min="1" max="10" value="5" type="number"></td>
<td><input min="1" max="10" value="5" type="number"></td>
<td><input min="1" max="10" value="5" type="number"></td>
<td><input min="1" max="10" value="5" type="number"></td>

</tr>
`;

});

function submitVote(){

const voter =
document.getElementById("voter").value;

if(!voter){
  alert("Enter your name");
  return;
}

const rows =
[...tbody.querySelectorAll("tr")];

const scores = rows.map(r=>{

const inputs =
r.querySelectorAll("input");

return {

team:
r.children[0].textContent,

overallTaste:
inputs[0].value,

sauceHarmony:
inputs[1].value,

creativity:
inputs[2].value,

tidiness:
inputs[3].value,

teamSpirit:
inputs[4].value,

presentation:
inputs[5].value,

technique:
inputs[6].value

};

});

fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({
voter,
scores
})
})
.then(()=>{

localStorage.setItem(
"voted",
"yes"
);

document.body.innerHTML =
"<h1>Thank you for voting!</h1>";

});

}

if(localStorage.getItem("voted")){
document.body.innerHTML =
"<h1>You have already voted.</h1>";
}

</script>

</body>
</html>
